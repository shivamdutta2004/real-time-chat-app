<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="join-body">

<div class="join-container">
  <h1>💬 Chat App</h1>
  <p>Connect instantly with your friends</p>

  <input id="username" placeholder="Enter Username" />
  <input id="room" placeholder="Enter Room Name" />

  <button onclick="joinChat()">Join Chat</button>
</div>

<script>
function joinChat() {
  const username = document.getElementById("username").value.trim();
  const room = document.getElementById("room").value.trim();

  if (!username || !room) {
    alert("Please fill all fields");
    return;
  }

  // Redirect with URL parameters (FIXED)
  window.location.href = `chat.html?username=${encodeURIComponent(username)}&room=${encodeURIComponent(room)}`;
}
</script>

</body>
</html>
